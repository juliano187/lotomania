<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conferidor Lotomania Pro</title>
    
    <!-- Biblioteca de IA para ler a imagem -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f2;
            color: #333;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        h1 {
            color: #ff6600;
            text-align: center;
            margin-bottom: 20px;
            font-size: 26px;
        }

        .section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            height: 90px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            resize: none;
            font-size: 16px;
            letter-spacing: 1px;
            font-family: monospace;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: #ff6600;
            outline: none;
        }

        input[type="file"] {
            display: block;
            width: 100%;
            padding: 12px;
            background: #f9f9f9;
            border: 2px dashed #bbb;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #00a859;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        button:hover {
            background-color: #008544;
        }

        .hidden {
            display: none !important;
        }

        #loading {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
            color: #ff6600;
            font-size: 15px;
        }

        #resultado {
            margin-top: 20px;
            padding: 15px;
            background-color: #f4faf6;
            border: 1px solid #e0f2e9;
            border-left: 6px solid #00a859;
            border-radius: 8px;
        }

        #total-acertos {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px dashed #ddd;
        }

        .grid-numeros {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
            gap: 8px;
            margin-top: 12px;
        }

        .badge {
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            color: white;
            border-radius: 50%;
            font-weight: bold;
            font-size: 14px;
        }

        .acerto {
            background-color: #00a859 !important;
            box-shadow: 0 2px 5px rgba(0, 168, 89, 0.3);
        }

        .normal {
            background-color: #9e9e9e;
        }

        @media (max-width: 380px) {
            h1 { font-size: 22px; }
            .grid-numeros { grid-template-columns: repeat(5, 1fr); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Conferidor Lotomania</h1>
        
        <div class="section">
            <label for="sorteados">1. Digite as 20 dezenas sorteadas:</label>
            <textarea id="sorteados" placeholder="Digite os números direto, ex: 021532..."></textarea>
        </div>

        <div class="section">
            <label for="upload-imagem">2. Tire uma foto ou envie o arquivo da cartela:</label>
            <input type="file" id="upload-imagem" accept="image/*" capture="environment">
        </div>

        <button id="btn-verificar">Analisar Jogo</button>

        <div id="loading" class="hidden">Lendo imagem e filtrando dezenas... Aguarde.</div>
        
        <div id="resultado" class="hidden">
            <div id="total-acertos"></div>
            <h3>Seu Jogo Escaneado:</h3>
            <p style="font-size: 12px; color: #666; margin-top: -2px; margin-bottom: 5px;">As dezenas em verde foram sorteadas.</p>
            <div id="numeros-acertados" class="grid-numeros"></div>
        </div>
    </div>

    <script>
        const campoSorteados = document.getElementById('sorteados');

        // --- MÁSCARA AUTOMÁTICA ---
        campoSorteados.addEventListener('input', (e) => {
            let textoOriginal = e.target.value;
            
            if (textoOriginal.match(/\b\d\s/)) {
                textoOriginal = textoOriginal.replace(/\b(\d)\b/g, '0$1');
            }

            let numeros = textoOriginal.replace(/\D/g, '');
            let _blocos = [];
            for (let i = 0; i < numeros.length; i += 2) {
                _blocos.push(numeros.substr(i, 2));
            }

            if (_blocos.length > 20) {
                _blocos = _blocos.slice(0, 20);
            }

            e.target.value = _blocos.join(' - ');
        });

        campoSorteados.addEventListener('blur', (e) => {
            let dezenas = e.target.value.split(' - ');
            dezenas = dezenas.map(d => (d.length === 1 && d !== '') ? '0' + d : d);
            e.target.value = dezenas.filter(d => d !== '').join(' - ');
        });

        // --- PROCESSAMENTO COM FILTRO RÍGIDO (00-99) ---
        document.getElementById('btn-verificar').addEventListener('click', async () => {
            const inputSorteados = campoSorteados.value;
            const arquivoImagem = document.getElementById('upload-imagem').files[0];
            const loading = document.getElementById('loading');
            const resultadoDiv = document.getElementById('resultado');

            if (!inputSorteados || !arquivoImagem) {
                alert('Por favor, preencha as dezenas e capture a imagem da cartela.');
                return;
            }

            let dezenasSorteadas = inputSorteados.match(/\d+/g) || [];
            dezenasSorteadas = dezenasSorteadas.map(num => num.length === 1 ? '0' + num : num);
            dezenasSorteadas = [...new Set(dezenasSorteadas)];
            
            if (dezenasSorteadas.length !== 20) {
                alert(`A Lotomania possui 20 números sorteados. Identificados: ${dezenasSorteadas.length}. Verifique.`);
                return;
            }

            loading.classList.remove('hidden');
            resultadoDiv.classList.add('hidden');

            try {
                const { data: { text } } = await Tesseract.recognize(arquivoImagem, 'por');
                
                // 1. Captura apenas blocos isolados de EXATAMENTE 2 dígitos numéricos
                let dezenasJogadas = text.match(/\b\d{2}\b/g) || [];
                
                // 2. Filtro de segurança extra: Garante matematicamente que está entre 0 e 99
                // Isso elimina qualquer leitura acidental acima de 100
                let dezenasValidadas = dezenasJogadas.filter(num => {
                    const n = parseInt(num, 10);
                    return n >= 0 && n <= 99;
                });
                
                const dezenasUnicas = [...new Set(dezenasValidadas)];

                if (dezenasUnicas.length === 0) {
                    alert('Não identifiquei dezenas válidas (00-99) na foto. Tente alinhar melhor a imagem.');
                    loading.classList.add('hidden');
                    return;
                }

                const acertos = dezenasUnicas.filter(num => dezenasSorteadas.includes(num));

                document.getElementById('total-acertos').innerHTML = `
                    Dezenas válidas detectadas: <strong>${dezenasUnicas.length}</strong> de 50.<br>
                    <span style="font-size: 22px; color: #00a859;"><strong>Total de Acertos: ${acertos.length}</strong></span>
                `;
                
                const areaNumeros = document.getElementById('numeros-acertados');
                areaNumeros.innerHTML = ''; 
                
                dezenasUnicas.sort((a, b) => parseInt(a) - parseInt(b));

                dezenasUnicas.forEach(num => {
                    if (dezenasSorteadas.includes(num)) {
                        areaNumeros.innerHTML += `<span class="badge acerto">${num}</span>`;
                    } else {
                        areaNumeros.innerHTML += `<span class="badge normal">${num}</span>`;
                    }
                });

                resultadoDiv.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                alert('Ocorreu um erro ao processar a imagem.');
            } finally {
                loading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
